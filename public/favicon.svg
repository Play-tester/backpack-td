<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Viking round shield -->
  <circle cx="24" cy="24" r="22" fill="#3d2510" stroke="#c8922a" stroke-width="2"/>
  <!-- Shield rim band -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#c8922a" stroke-width="1.5" opacity="0.6"/>
  <!-- Shield quadrant lines -->
  <line x1="24" y1="6" x2="24" y2="42" stroke="#c8922a" stroke-width="1.2" opacity="0.5"/>
  <line x1="6" y1="24" x2="42" y2="24" stroke="#c8922a" stroke-width="1.2" opacity="0.5"/>
  <!-- Central boss (iron dome) -->
  <circle cx="24" cy="24" r="6" fill="#4a5f6e" stroke="#c8922a" stroke-width="1.5"/>
  <circle cx="24" cy="24" r="3" fill="#6a7f8e"/>
  <!-- Diagonal cross detail -->
  <line x1="11.5" y1="11.5" x2="36.5" y2="36.5" stroke="#c8922a" stroke-width="1" opacity="0.35"/>
  <line x1="36.5" y1="11.5" x2="11.5" y2="36.5" stroke="#c8922a" stroke-width="1" opacity="0.35"/>
</svg>
